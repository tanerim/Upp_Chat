<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upp Chat</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
  <!-- Header -->
  <header>
    <h1>Upp Chat</h1>
    <p>Local LLM Conversation Environment</p>
  </header>

  <!-- Settings Section -->
  <section class="settings">
    <div class="model-card">
      <h3>Left Model</h3>
      <div class="inline-field">
        <label for="leftModel">Model:</label>
        <select id="leftModel">
          {% for m in models %}
            <option value="{{m.name}}">{{m.label}}</option>
          {% endfor %}
        </select>
      </div>
      <div class="inline-field">
        <label for="tempL">Temperature:</label>
        <input type="number" id="tempL" value="0.7" step="0.1" min="0" max="1" />
      </div>
      <div class="inline-field">
        <label for="kL">Top K:</label>
        <input type="number" id="kL" value="40" />
      </div>
      <div class="inline-field">
        <label for="pL">Top P:</label>
        <input type="number" id="pL" value="0.9" step="0.1" min="0" max="1" />
      </div>
      <div class="inline-field">
        <label for="hostL">Ollama Host:</label>
        <input type="text" id="hostL" value="http://127.0.0.1:11434" />
      </div>
    </div>

    <div class="model-card">
      <h3>Right Model</h3>
      <div class="inline-field">
        <label for="rightModel">Model:</label>
        <select id="rightModel">
          {% for m in models %}
            <option value="{{m.name}}">{{m.label}}</option>
          {% endfor %}
        </select>
      </div>
      <div class="inline-field">
        <label for="tempR">Temperature:</label>
        <input type="number" id="tempR" value="0.7" step="0.1" min="0" max="1" />
      </div>
      <div class="inline-field">
        <label for="kR">Top K:</label>
        <input type="number" id="kR" value="40" />
      </div>
      <div class="inline-field">
        <label for="pR">Top P:</label>
        <input type="number" id="pR" value="0.9" step="0.1" min="0" max="1" />
      </div>
      <div class="inline-field">
        <label for="hostR">Ollama Host:</label>
        <input type="text" id="hostR" value="http://127.0.0.1:11435" />
      </div>
    </div>
  </section>

  <section class="settings">
    <div class="model-card">
      <h3>Conversation Runtime</h3>
      <div class="inline-field">
        <label for="turns">Turns:</label>
        <input type="number" id="turns" value="15" min="1" max="200" />
      </div>
      <div class="inline-field">
        <label for="keepAlive">Keep Alive:</label>
        <input type="text" id="keepAlive" value="20m" />
      </div>
    </div>
  </section>

  <section class="center-control">
    <button id="startBtn">Start Conversation</button>
  </section>

  <!-- Chat Area -->
  <main id="chatbox"></main>

  <!-- Bottom Controls -->
  <div class="bottom-bar">
    <button id="saveBtn" disabled>Save Conversation</button>
  </div>

  <!-- Footer -->
  <footer class="footer">ts @ 2025</footer>

  <!-- Conversation Init Modal -->
  <div id="initModal" class="modal">
    <div class="modal-content">
      <h2>🎯 Define Each Model’s Role & Goal</h2>

      <div class="inline-field modal-inline-field">
        <label for="topicPreset"><strong>Topic Preset:</strong></label>
        <select id="topicPreset">
          <option value="">Manual prompt yazacağım</option>
          <option value="sun">Güneşin rengi (Doğu vs Batı)</option>
          <option value="dragon">Ejderha simgesi (koruyucu vs yıkıcı)</option>
          <option value="coffee">Kahve kültürü (ritüel vs hız)</option>
        </select>
      </div>

      <label for="userPromptLeft"><strong>Left Model Prompt:</strong></label>
      <textarea id="userPromptLeft" placeholder="e.g., You are a philosopher exploring the ethics of AI consciousness..."></textarea>

      <label for="userPromptRight"><strong>Right Model Prompt:</strong></label>
      <textarea id="userPromptRight" placeholder="e.g., You are a scientist analyzing consciousness through empirical methods..."></textarea>

      <div class="force-lang-row">
        <input type="checkbox" id="forceTurkish" checked />
        <label for="forceTurkish"><strong>Türkçe konuş (zorla)</strong></label>
      </div>

      <div class="modal-actions">
        <button id="cancelInit">Cancel</button>
        <button id="confirmInit">Start</button>
      </div>
    </div>
  </div>

  <!-- Go Top Button -->
  <button id="goTopBtn" title="Go to top">⬆</button>

  <!-- Scripts -->
  <script>
    // -------- Stopword list --------
    const STOP_WORDS = new Set([
      "a","an","the","and","or","but","if","then","so","as","at","by","for","from","in","into","of","on","to","up","with",
      "without","about","above","after","again","against","all","am","are","aren’t","be","because","been","being","below",
      "between","both","can","could","did","do","does","doing","down","during","each","few","further","had","has","have",
      "having","he","her","here","hers","herself","him","himself","his","how","i","i’m","i’ve","i’ll","i’d","is","it","its",
      "it’s","itself","let","me","more","most","my","myself","no","nor","not","now","off","once","only","other","our","ours",
      "ourselves","out","over","own","same","she","should","so","some","such","than","that","their","theirs","them",
      "themselves","then","there","these","they","this","those","through","too","under","until","very","was","we","were",
      "what","when","where","which","while","who","whom","why","will","with","would","you","your","yours","yourself","yourselves",
      "s", "t", "ve", "d", "m", "isn", "ll", "e", "g"
    ]);

    function topWords(text, n = 10) {
      const words = text.toLowerCase().replace(/[^a-z\s]/g, " ").split(/\s+/)
        .filter(w => w && !STOP_WORDS.has(w));
      const freq = {};
      for (const w of words) freq[w] = (freq[w] || 0) + 1;
      return Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, n);
    }

    let conversation = [];
    let currentRole = null;
    let currentBuffer = "";

    // -------- Modal Logic --------
    const modal = $("#initModal");
    const leftPromptInput = $("#userPromptLeft");
    const rightPromptInput = $("#userPromptRight");
    const forceTurkishInput = $("#forceTurkish");
    const topicPresetInput = $("#topicPreset");

    const TOPIC_PRESETS = {
      sun: {
        left: "Güneş batı kültüründe sarıdır. Bu tezi kültürel sanat, eğitim ve sembolizm üzerinden güçlü şekilde savun.",
        right: "Güneş doğu kültüründe beyazdır. Bu tezi kültürel algı, estetik ve tarihsel örneklerle güçlü şekilde savun."
      },
      dragon: {
        left: "Batı anlatılarında ejderha çoğunlukla yıkıcı bir tehdittir. Bu yaklaşımı mitoloji ve edebiyat üzerinden savun.",
        right: "Doğu anlatılarında ejderha çoğunlukla bilgelik ve koruyuculuğun sembolüdür. Bu yaklaşımı mitoloji ve halk kültürü üzerinden savun."
      },
      coffee: {
        left: "Batı kahve kültürü verimlilik ve hız odaklıdır. Bu tezi modern iş yaşamı ve tüketim alışkanlıklarıyla savun.",
        right: "Doğu kahve kültürü ritüel, sohbet ve misafirperverlik odaklıdır. Bu tezi toplumsal gelenekler ve gündelik yaşamla savun."
      }
    };

    function applyTopicPreset(presetKey) {
      const preset = TOPIC_PRESETS[presetKey];
      if (!preset) return;
      leftPromptInput.val(preset.left);
      rightPromptInput.val(preset.right);
    }

    topicPresetInput.on("change", function () {
      applyTopicPreset($(this).val());
    });

    $("#startBtn").click(() => {
      modal.addClass("active");
      topicPresetInput.val("");
      forceTurkishInput.prop("checked", true);
      leftPromptInput.val("").focus();
      rightPromptInput.val("");
    });

    $("#cancelInit").click(() => {
      modal.removeClass("active");
    });

    $("#confirmInit").click(() => {
      let leftPrompt = leftPromptInput.val().trim();
      let rightPrompt = rightPromptInput.val().trim();
      if (!leftPrompt || !rightPrompt) {
        alert("Please define both models' roles or goals.");
        return;
      }

      if (forceTurkishInput.is(":checked")) {
        const trGuard = "Yanıtlarını yalnızca Türkçe üret. Başka dil kullanma.";
        leftPrompt = `${leftPrompt}

${trGuard}`;
        rightPrompt = `${rightPrompt}

${trGuard}`;
      }

      modal.removeClass("active");
      startConversation(leftPrompt, rightPrompt);
    });

    // -------- Main Conversation Function --------
    async function startConversation(leftPrompt, rightPrompt) {
      const left = $("#leftModel").val();
      const right = $("#rightModel").val();
      const left_temperature = parseFloat($("#tempL").val());
      const left_top_k = parseInt($("#kL").val());
      const left_top_p = parseFloat($("#pL").val());
      const right_temperature = parseFloat($("#tempR").val());
      const right_top_k = parseInt($("#kR").val());
      const right_top_p = parseFloat($("#pR").val());
      const left_host = $("#hostL").val().trim();
      const right_host = $("#hostR").val().trim();
      const turns = parseInt($("#turns").val());
      const keep_alive = $("#keepAlive").val().trim();

      $("#chatbox").html("<p class='system'>Starting conversation...</p>");
      $("#saveBtn").prop("disabled", true);
      conversation = [];

      const response = await fetch("/api/chat-stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          left_model: left,
          right_model: right,
          left_temperature,
          left_top_k,
          left_top_p,
          right_temperature,
          right_top_k,
          right_top_p,
          left_host,
          right_host,
          turns,
          keep_alive,
          prompt_left: leftPrompt,
          prompt_right: rightPrompt
        }),
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      async function flushMessage(role) {
        if (!currentBuffer.trim()) return;
        const cssClass = role.includes(left)
          ? "left-msg"
          : role.includes(right)
          ? "right-msg"
          : "system";
        const modelLabel = `<strong class='model-name'>${role}</strong>`;
        const msgText = currentBuffer.trim();

        let freqHTML = "";
        if (cssClass !== "system") {
          const topFreq = topWords(msgText);
          if (topFreq.length) {
            freqHTML = `<div class='freq-box'><strong>Top Words:</strong> ${topFreq.map(([w, c]) => `<span>${w} (${c})</span>`).join(" ")}</div>`;
          }
        }

        conversation.push({ role, content: msgText });
        $("#chatbox").append(`<div class='${cssClass} fade-in'>${modelLabel}<div class='msg-text'>${msgText}</div>${freqHTML}</div>`);
        $("#chatbox").scrollTop($("#chatbox")[0].scrollHeight);
        currentBuffer = "";
      }

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split("\n\n");
        buffer = parts.pop();
        for (const part of parts) {
          if (!part.startsWith("data: ")) continue;
          const payload = JSON.parse(part.slice(6));
          const role = payload.role;
          const token = payload.token;
          if (role !== currentRole && currentRole !== null) await flushMessage(currentRole);
          currentRole = role;
          currentBuffer += token;
        }
      }

      await flushMessage(currentRole);
      $("#chatbox").append("<p class='system'>Conversation finished.</p>");
      $("#saveBtn").prop("disabled", false);
    }

    // -------- Save Conversation --------
    $("#saveBtn").click(async function () {
      if (!conversation.length) {
        showToast("⚠️ No conversation to save!");
        return;
      }

      const payload = {
        left_model: $("#leftModel").val(),
        right_model: $("#rightModel").val(),
        temperature: parseFloat($("#tempL").val()),
        top_k: parseInt($("#kL").val()),
        top_p: parseFloat($("#pL").val()),
        left_host: $("#hostL").val().trim(),
        right_host: $("#hostR").val().trim(),
        turns: parseInt($("#turns").val()),
        keep_alive: $("#keepAlive").val().trim(),
        conversation,
      };

      try {
        const response = await fetch("/api/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const result = await response.json();
        if (response.ok && result.status === "saved") {
          showToast(`✅ Conversation saved! ID: ${result.id}`);
        } else {
          showToast(`❌ Save failed: ${result.error || "Unknown error"}`);
        }
      } catch (err) {
        showToast(`⚠️ Save error: ${err.message}`);
      }
    });

    // -------- Toast Notification --------
    function showToast(msg) {
      const t = document.createElement("div");
      t.textContent = msg;
      Object.assign(t.style, {
        position: "fixed",
        bottom: "80px",
        left: "50%",
        transform: "translateX(-50%)",
        background: "#a5b4fc",
        color: "#111827",
        padding: "10px 20px",
        borderRadius: "10px",
        fontWeight: "600",
        boxShadow: "0 2px 6px rgba(0,0,0,0.2)",
        opacity: 0,
        transition: "opacity 0.5s",
        zIndex: 9999
      });
      document.body.appendChild(t);
      setTimeout(() => (t.style.opacity = 1), 50);
      setTimeout(() => {
        t.style.opacity = 0;
        setTimeout(() => t.remove(), 500);
      }, 3000);
    }

    // -------- Go Top Button --------
    const goTopBtn = document.getElementById("goTopBtn");
    const chatbox = document.getElementById("chatbox");

    chatbox.addEventListener("scroll", () => {
      goTopBtn.classList.toggle("show", chatbox.scrollTop > 200);
    });
    goTopBtn.addEventListener("click", () => {
      chatbox.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>
</body>
</html>
