<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upp Chat · Pro Console</title>
  <link rel="stylesheet" href="/static/style.css?v={{ css_version }}" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Upp Chat</h1>
      <p>Local LLM Conversation Console</p>
    </div>
    <div class="status-pills">
      <span class="pill">⚡ Stream</span>
      <span class="pill">🧠 Dual Model</span>
      <span class="pill">💾 SQLite</span>
    </div>
  </header>

  <section class="dashboard-grid">
    <article class="panel">
      <h3>Left Model</h3>
      <label>Model<select id="leftModel">{% for m in models %}<option value="{{m.name}}">{{m.label}}</option>{% endfor %}</select></label>
      <label>Temperature<input type="number" id="tempL" value="0.7" step="0.1" min="0" max="1" /></label>
      <label>Top K<input type="number" id="kL" value="40" /></label>
      <label>Top P<input type="number" id="pL" value="0.9" step="0.1" min="0" max="1" /></label>
      <label>Ollama Host<input type="text" id="hostL" value="http://127.0.0.1:11434" /></label>
    </article>

    <article class="panel">
      <h3>Right Model</h3>
      <label>Model<select id="rightModel">{% for m in models %}<option value="{{m.name}}">{{m.label}}</option>{% endfor %}</select></label>
      <label>Temperature<input type="number" id="tempR" value="0.7" step="0.1" min="0" max="1" /></label>
      <label>Top K<input type="number" id="kR" value="40" /></label>
      <label>Top P<input type="number" id="pR" value="0.9" step="0.1" min="0" max="1" /></label>
      <label>Ollama Host<input type="text" id="hostR" value="http://127.0.0.1:11435" /></label>
    </article>

    <article class="panel runtime-panel">
      <h3>Runtime</h3>
      <label>Turns<input type="number" id="turns" value="15" min="1" max="200" /></label>
      <label>Keep Alive<input type="text" id="keepAlive" value="20m" /></label>
      <div class="runtime-stats">
        <div><span id="statMessages">0</span><small>Mesaj</small></div>
        <div><span id="statTokens">0</span><small>Token</small></div>
        <div><span id="statTime">0s</span><small>Süre</small></div>
      </div>
      <div class="action-row">
        <button id="startBtn">Start Conversation</button>
        <button id="saveBtn" disabled>Save</button>
      </div>
    </article>
  </section>

  <main id="chatbox" aria-live="polite"></main>

  <footer class="footer">Upp Chat • 2026</footer>

  <div id="initModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <h2>🎯 Model Rolleri</h2>
      <label>Konu Preseti
        <select id="topicPreset">
          <option value="">Manual prompt yazacağım</option>
          <option value="sun">Güneşin rengi (Doğu vs Batı)</option>
          <option value="dragon">Ejderha simgesi (koruyucu vs yıkıcı)</option>
          <option value="coffee">Kahve kültürü (ritüel vs hız)</option>
        </select>
      </label>
      <label>Left Model Prompt<textarea id="userPromptLeft"></textarea></label>
      <label>Right Model Prompt<textarea id="userPromptRight"></textarea></label>
      <label class="checkbox-row"><input type="checkbox" id="forceTurkish" checked /> Türkçe konuş (zorla)</label>
      <div class="modal-actions">
        <button id="cancelInit">Cancel</button>
        <button id="confirmInit">Start</button>
      </div>
    </div>
  </div>

  <button id="goTopBtn" title="Go to top">⬆</button>

  <script>
    const $ = (id) => document.getElementById(id);
    const STOP_WORDS = new Set(["a","an","the","and","or","but","if","then","so","as","at","by","for","from","in","into","of","on","to","up","with","without","about","above","after","again","against","all","am","are","be","because","been","being","below","between","both","can","could","did","do","does","doing","down","during","each","few","further","had","has","have","having","he","her","here","hers","herself","him","himself","his","how","i","is","it","its","itself","let","me","more","most","my","myself","no","nor","not","now","off","once","only","other","our","ours","ourselves","out","over","own","same","she","should","some","such","than","that","their","theirs","them","themselves","there","these","they","this","those","through","too","under","until","very","was","we","were","what","when","where","which","while","who","whom","why","will","would","you","your","yours","yourself","yourselves"]);

    const modal = $("initModal");
    const chatbox = $("chatbox");
    const goTopBtn = $("goTopBtn");

    let conversation = [];
    let currentRole = null;
    let currentNode = null;
    let currentTextNode = null;
    let currentText = "";
    let tokenCount = 0;
    let startTs = 0;
    let ticker = null;

    const TOPIC_PRESETS = {
      sun: { left: "Güneş batı kültüründe sarıdır. Bu tezi kültürel sanat, eğitim ve sembolizm üzerinden güçlü şekilde savun.", right: "Güneş doğu kültüründe beyazdır. Bu tezi kültürel algı, estetik ve tarihsel örneklerle güçlü şekilde savun." },
      dragon: { left: "Batı anlatılarında ejderha çoğunlukla yıkıcı bir tehdittir. Bu yaklaşımı mitoloji ve edebiyat üzerinden savun.", right: "Doğu anlatılarında ejderha çoğunlukla bilgelik ve koruyuculuğun sembolüdür. Bu yaklaşımı mitoloji ve halk kültürü üzerinden savun." },
      coffee: { left: "Batı kahve kültürü verimlilik ve hız odaklıdır. Bu tezi modern iş yaşamı ve tüketim alışkanlıklarıyla savun.", right: "Doğu kahve kültürü ritüel, sohbet ve misafirperverlik odaklıdır. Bu tezi toplumsal gelenekler ve gündelik yaşamla savun." }
    };

    function topWords(text, n = 8) {
      const words = text.toLowerCase().replace(/[^a-zçğıöşü\s]/gi, " ").split(/\s+/).filter(w => w && !STOP_WORDS.has(w));
      const freq = {};
      for (const w of words) freq[w] = (freq[w] || 0) + 1;
      return Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, n);
    }

    function updateStats() {
      $("statMessages").textContent = conversation.length;
      $("statTokens").textContent = tokenCount;
      if (startTs) $("statTime").textContent = `${Math.floor((Date.now() - startTs) / 1000)}s`;
    }

    function makeMessageNode(role, left, right) {
      const klass = role.includes(left) ? "left-msg" : role.includes(right) ? "right-msg" : "system";
      const wrap = document.createElement("div");
      wrap.className = `msg ${klass}`;
      const name = document.createElement("strong");
      name.className = "model-name";
      name.textContent = role;
      const text = document.createElement("div");
      text.className = "msg-text";
      wrap.append(name, text);
      chatbox.appendChild(wrap);
      return { wrap, text, klass };
    }

    function flushMessage() {
      if (!currentNode || !currentText.trim()) return;
      if (currentNode.classList.contains("left-msg") || currentNode.classList.contains("right-msg")) {
        const freqs = topWords(currentText);
        if (freqs.length) {
          const freqBox = document.createElement("div");
          freqBox.className = "freq-box";
          freqBox.innerHTML = `<strong>Top Words:</strong> ${freqs.map(([w, c]) => `<span>${w} (${c})</span>`).join(" ")}`;
          currentNode.appendChild(freqBox);
        }
      }
      conversation.push({ role: currentRole, content: currentText.trim() });
      currentNode = null;
      currentTextNode = null;
      currentText = "";
      updateStats();
    }

    function showToast(msg) {
      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      document.body.appendChild(t);
      requestAnimationFrame(() => t.classList.add("show"));
      setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 250); }, 2600);
    }

    $("topicPreset").addEventListener("change", (e) => {
      const p = TOPIC_PRESETS[e.target.value];
      if (!p) return;
      $("userPromptLeft").value = p.left;
      $("userPromptRight").value = p.right;
    });

    $("startBtn").addEventListener("click", () => {
      modal.classList.add("active");
      modal.setAttribute("aria-hidden", "false");
      $("userPromptLeft").focus();
    });

    $("cancelInit").addEventListener("click", () => {
      modal.classList.remove("active");
      modal.setAttribute("aria-hidden", "true");
    });

    $("confirmInit").addEventListener("click", () => {
      let leftPrompt = $("userPromptLeft").value.trim();
      let rightPrompt = $("userPromptRight").value.trim();
      if (!leftPrompt || !rightPrompt) return alert("Please define both model prompts.");
      if ($("forceTurkish").checked) {
        const trGuard = "Yanıtlarını yalnızca Türkçe üret. Başka dil kullanma.";
        leftPrompt += `\n\n${trGuard}`;
        rightPrompt += `\n\n${trGuard}`;
      }
      modal.classList.remove("active");
      modal.setAttribute("aria-hidden", "true");
      startConversation(leftPrompt, rightPrompt);
    });

    async function startConversation(leftPrompt, rightPrompt) {
      const left = $("leftModel").value;
      const right = $("rightModel").value;
      const payload = {
        left_model: left,
        right_model: right,
        left_temperature: parseFloat($("tempL").value),
        left_top_k: parseInt($("kL").value),
        left_top_p: parseFloat($("pL").value),
        right_temperature: parseFloat($("tempR").value),
        right_top_k: parseInt($("kR").value),
        right_top_p: parseFloat($("pR").value),
        left_host: $("hostL").value.trim(),
        right_host: $("hostR").value.trim(),
        turns: parseInt($("turns").value),
        keep_alive: $("keepAlive").value.trim(),
        prompt_left: leftPrompt,
        prompt_right: rightPrompt
      };

      chatbox.innerHTML = "<p class='system-line'>Starting conversation...</p>";
      conversation = [];
      currentRole = null;
      currentText = "";
      tokenCount = 0;
      startTs = Date.now();
      clearInterval(ticker);
      ticker = setInterval(updateStats, 1000);
      $("saveBtn").disabled = true;
      updateStats();

      try {
        const response = await fetch("/api/chat-stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok || !response.body) {
          throw new Error(`Stream request failed (${response.status})`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop() || "";

          for (const part of parts) {
            if (!part.startsWith("data: ")) continue;
            const payload = JSON.parse(part.slice(6));
            const role = payload.role;
            const token = typeof payload.token === "string" ? payload.token : "";
            tokenCount += token.length;

            if (role !== currentRole) {
              flushMessage();
              currentRole = role;
              const node = makeMessageNode(role, left, right);
              currentNode = node.wrap;
              currentTextNode = node.text;
            }

            currentText += token;
            if (currentTextNode) currentTextNode.textContent = currentText;
          }

          chatbox.scrollTop = chatbox.scrollHeight;
        }
      } catch (err) {
        chatbox.insertAdjacentHTML("beforeend", `<p class='system-line'>❌ ${err.message}</p>`);
        showToast(`❌ ${err.message}`);
      } finally {
        flushMessage();
        chatbox.insertAdjacentHTML("beforeend", "<p class='system-line'>Conversation finished.</p>");
        $("saveBtn").disabled = false;
        clearInterval(ticker);
        updateStats();
      }
    }

    $("saveBtn").addEventListener("click", async () => {
      if (!conversation.length) return showToast("⚠️ No conversation to save!");
      const payload = {
        left_model: $("leftModel").value,
        right_model: $("rightModel").value,
        temperature: parseFloat($("tempL").value),
        top_k: parseInt($("kL").value),
        top_p: parseFloat($("pL").value),
        conversation
      };
      try {
        const response = await fetch("/api/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (response.ok && result.status === "saved") showToast(`✅ Saved: ${result.id}`);
        else showToast(`❌ Save failed: ${result.error || "Unknown"}`);
      } catch (err) {
        showToast(`⚠️ Save error: ${err.message}`);
      }
    });

    chatbox.addEventListener("scroll", () => goTopBtn.classList.toggle("show", chatbox.scrollTop > 220));
    goTopBtn.addEventListener("click", () => chatbox.scrollTo({ top: 0, behavior: "smooth" }));
  </script>
</body>
</html>
